    name: "长江电力"
    dividend_yield: 0.038
    entry: 28.50
    position: 0.25
    held: false
    note: "现金流稳定，类债属性，回调即买"
  - ticker: "000651.SZ"
    name: "格力电器"
    dividend_yield: 0.055
    entry: 38.00
    position: 0.20
    held: false
    note: "高分红+回购，注意空调周期"
  - ticker: "601398.SS"
    name: "工商银行"
    dividend_yield: 0.060
